services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ev_ready}
      POSTGRES_USER: ${DB_USER:?Set DB_USER in the environment}
      POSTGRES_PASSWORD: ${DB_PASS:?Set DB_PASS in the environment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ev_ready}
      DB_USER: ${DB_USER:?Set DB_USER in the environment}
      DB_PASS: ${DB_PASS:?Set DB_PASS in the environment}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in the environment}
      LOG_PATH: ${LOG_PATH:-/app/logs}
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      LEAD_NOTIFICATION_TO: ${LEAD_NOTIFICATION_TO:-}
      CONTACT_NOTIFICATION_TO: ${CONTACT_NOTIFICATION_TO:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      AI_RECOMMENDER_BASE_URL: ${AI_RECOMMENDER_BASE_URL:?Set AI_RECOMMENDER_BASE_URL in the environment}
      AI_RECOMMENDER_CONNECT_TIMEOUT: ${AI_RECOMMENDER_CONNECT_TIMEOUT:-5s}
      AI_RECOMMENDER_READ_TIMEOUT: ${AI_RECOMMENDER_READ_TIMEOUT:-95s}
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    volumes:
      - /opt/evready/logs/backend:${LOG_PATH:-/app/logs}

volumes:
  postgres_data:
