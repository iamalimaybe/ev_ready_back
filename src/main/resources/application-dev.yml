server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ev_ready}
    username: ${DB_USER:evready}
    password: ${DB_PASS:evreadypass}

evready:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai:
    recommender:
      base-url: ${AI_RECOMMENDER_BASE_URL:http://localhost:8081}
      connect-timeout: ${AI_RECOMMENDER_CONNECT_TIMEOUT:5s}
      read-timeout: ${AI_RECOMMENDER_READ_TIMEOUT:95s}
    recommendation-rate-limit:
      max-requests: ${AI_RECOMMENDATION_RATE_LIMIT_MAX_REQUESTS:2}
      window: ${AI_RECOMMENDATION_RATE_LIMIT_WINDOW:10m}
      entry-ttl: ${AI_RECOMMENDATION_RATE_LIMIT_ENTRY_TTL:30m}