spring:
  application:
    name: ev-ready-pakistan

  datasource:
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 20000
      pool-name: EvReadyPool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:/db/db.changelog-master.xml

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

evready:
  admin:
    username: ${ADMIN_USERNAME:}
    password: ${ADMIN_PASSWORD:}
  email:
    notifications:
      enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
      from: ${SMTP_FROM:}
      lead-to: ${LEAD_NOTIFICATION_TO:}
      contact-to: ${CONTACT_NOTIFICATION_TO:}
