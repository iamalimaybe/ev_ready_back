server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

evready:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  ai:
    recommender:
      base-url: ${AI_RECOMMENDER_BASE_URL}
      connect-timeout: ${AI_RECOMMENDER_CONNECT_TIMEOUT:5s}
      read-timeout: ${AI_RECOMMENDER_READ_TIMEOUT:95s}
    recommendation-rate-limit:
      max-requests: ${AI_RECOMMENDATION_RATE_LIMIT_MAX_REQUESTS:2}
      window: ${AI_RECOMMENDATION_RATE_LIMIT_WINDOW:10m}
      entry-ttl: ${AI_RECOMMENDATION_RATE_LIMIT_ENTRY_TTL:30m}

logging:
  file:
    name: "${LOG_FILE:${LOG_PATH:logs}/evready-backend.log}"
  logback:
    rollingpolicy:
      file-name-pattern: "${LOG_FILE:${LOG_PATH:logs}/evready-backend.log}.%d{yyyy-MM-dd}.%i.gz"
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 500MB