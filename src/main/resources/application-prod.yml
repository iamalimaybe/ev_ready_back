server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

evready:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  file:
    name: "${LOG_FILE:${LOG_PATH:logs}/evready-backend.log}"
  logback:
    rollingpolicy:
      file-name-pattern: "${LOG_FILE:${LOG_PATH:logs}/evready-backend.log}.%d{yyyy-MM-dd}.%i.gz"
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 500MB
